<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミニフェス 座席検索</title>
  <style>
    @font-face {
      font-family: 'Keifont';
      src: url('keifont.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Keifont', "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #fffcf2;
      color: #384860;
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    /* ヘッダー */
    .header {
      background: #384860;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    .header-logo {
      max-width: 380px;
      width: 80%;
      height: auto;
      display: block;
      margin: 0 auto 0.6rem;
    }
    .header p {
      color: #fff;
      font-size: 1rem;
      opacity: 0.9;
    }

    /* 検索エリア */
    .search-container {
      max-width: 640px;
      margin: -1.2rem auto 2rem;
      padding: 0 1rem;
    }
    .search-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1.5rem;
    }
    .search-field {
      margin-bottom: 1rem;
    }
    .search-field:last-child {
      margin-bottom: 0;
    }
    .search-field label {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      color: #384860;
      margin-bottom: 0.4rem;
    }
    .search-field input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 2px solid #e0ddd5;
      border-radius: 40px;
      font-size: 1rem;
      font-family: 'Keifont', "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      transition: border-color 0.2s;
      outline: none;
      background: #fffcf2;
      color: #384860;
    }
    .search-field input:focus {
      border-color: #de1b65;
    }
    .search-field input::placeholder {
      color: #a09d95;
    }
    .search-or {
      text-align: center;
      font-size: 0.85rem;
      color: #a09d95;
      margin-bottom: 1rem;
      position: relative;
    }
    .search-or::before,
    .search-or::after {
      content: '';
      display: inline-block;
      width: 30%;
      height: 1px;
      background: #e0ddd5;
      vertical-align: middle;
      margin: 0 0.8rem;
    }

    /* 結果エリア */
    .result-container {
      max-width: 700px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    .no-result, .loading, .error {
      text-align: center;
      padding: 2rem;
      color: #a09d95;
      font-size: 1rem;
    }
    .error { color: #de1b65; }

    /* プロフィールカード */
    .profile-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .profile-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #384860;
      margin-bottom: 0.25rem;
      word-break: break-all;
    }
    .profile-card .profile-url {
      font-size: 0.8rem;
      color: #de1b65;
      word-break: break-all;
      display: block;
      margin-bottom: 1.2rem;
      text-decoration: none;
    }
    .profile-card .profile-url:hover {
      text-decoration: underline;
    }

    /* ラウンドセクション */
    .round-section {
      background: #f7f7f7;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
    }
    .round-section:last-child { margin-bottom: 0; }
    .round-section h3 {
      font-size: 1rem;
      color: #384860;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
    }
    .round-section h3 .table-badge {
      background: #de1b65;
      color: #fff;
      padding: 0.15rem 0.75rem;
      border-radius: 40px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    /* メンバーリスト */
    .member-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .member-list li {
      background: #fff;
      border: 1px solid #e0ddd5;
      border-radius: 40px;
      padding: 0.25rem 0.65rem;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .member-list li.is-me {
      background: #de1b65;
      color: #fff;
      border-color: #de1b65;
      font-weight: 700;
    }
    .member-list li a {
      color: inherit;
      text-decoration: none;
    }
    .member-list li:not(.is-me) a:hover {
      color: #de1b65;
    }

    /* フッター */
    .footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #a09d95;
    }

    @media (max-width: 480px) {
      .header-logo { max-width: 260px; }
      .search-box { padding: 1rem; }
      .round-section { padding: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="リベシティ大交流会2026福岡（ミニフェス）_2段.png" alt="リベシティ大交流会 2026 福岡（ミニフェス）" class="header-logo">
    <p>座席検索</p>
  </div>

  <div class="search-container">
    <div class="search-box">
      <div class="search-field">
        <label for="searchName">リベシティ名</label>
        <input type="text" id="searchName" placeholder="例：Bora太郎">
      </div>
      <div class="search-or">または</div>
      <div class="search-field">
        <label for="searchUrl">プロフィールURL</label>
        <input type="text" id="searchUrl" placeholder="例：libecity.com/user_profile/xxx">
      </div>
    </div>
  </div>

  <div class="result-container" id="results">
    <p class="no-result" id="initialMessage">リベシティ名またはプロフィールURLを入力して検索してください</p>
  </div>

  <div class="footer">
    データはGoogleスプレッドシートから取得しています
  </div>

  <script>
    const SPREADSHEET_ID = '1KiYzG4fGmfUKQzs3HRnqZspSx2UMJ33_QCcMdAXuzsQ';
    const GID = '1790222964';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GID}`;

    let allData = [];
    let table1Groups = {};
    let table2Groups = {};

    async function loadData() {
      const results = document.getElementById('results');
      results.innerHTML = '<p class="loading">データを読み込み中...</p>';

      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error('データの取得に失敗しました');
        const text = await res.text();
        parseCSV(text);
        results.innerHTML = '<p class="no-result" id="initialMessage">リベシティ名またはプロフィールURLを入力して検索してください</p>';
      } catch (e) {
        results.innerHTML = '<p class="error">データの読み込みに失敗しました。<br>ページを再読み込みしてください。</p>';
        console.error(e);
      }
    }

    function parseCSV(text) {
      const lines = text.split('\n');
      let dataStarted = false;

      for (const line of lines) {
        const cols = parseCSVLine(line);

        if (!dataStarted) {
          if (cols[0] && cols[0].includes('リベシティ名')) {
            dataStarted = true;
          }
          continue;
        }

        const name = (cols[0] || '').trim();
        const url = (cols[1] || '').trim();
        const table1 = (cols[2] || '').trim();
        const serial1 = (cols[3] || '').trim();
        const table2 = (cols[4] || '').trim();
        const serial2 = (cols[5] || '').trim();

        if (!name && !url) continue;

        const entry = { name, url, table1, serial1, table2, serial2 };
        allData.push(entry);

        if (table1) {
          if (!table1Groups[table1]) table1Groups[table1] = [];
          table1Groups[table1].push(entry);
        }
        if (table2) {
          if (!table2Groups[table2]) table2Groups[table2] = [];
          table2Groups[table2].push(entry);
        }
      }
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"') {
            if (i + 1 < line.length && line[i + 1] === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            current += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            result.push(current);
            current = '';
          } else {
            current += ch;
          }
        }
      }
      result.push(current);
      return result;
    }

    function doSearch() {
      const nameQuery = document.getElementById('searchName').value.trim().toLowerCase();
      const urlQuery = document.getElementById('searchUrl').value.trim().toLowerCase();
      const results = document.getElementById('results');

      if (!nameQuery && !urlQuery) {
        results.innerHTML = '<p class="no-result">リベシティ名またはプロフィールURLを入力して検索してください</p>';
        return;
      }

      let matches;
      if (nameQuery) {
        matches = allData.filter(d => d.name.toLowerCase().includes(nameQuery));
      } else {
        matches = allData.filter(d => d.url.toLowerCase().includes(urlQuery));
      }

      if (matches.length === 0) {
        results.innerHTML = '<p class="no-result">該当するデータが見つかりませんでした</p>';
        return;
      }

      const shown = matches.slice(0, 10);
      results.innerHTML = shown.map(m => renderResult(m)).join('');

      if (matches.length > 10) {
        results.innerHTML += `<p class="no-result">他 ${matches.length - 10} 件が該当しています。検索条件を絞り込んでください。</p>`;
      }
    }

    function renderResult(entry) {
      const members1 = table1Groups[entry.table1] || [];
      const members2 = table2Groups[entry.table2] || [];

      return `
        <div class="profile-card">
          <h2>${escapeHTML(entry.name)}</h2>
          <a class="profile-url" href="${escapeHTML(entry.url)}" target="_blank" rel="noopener">${escapeHTML(entry.url)}</a>

          <div class="round-section">
            <h3>1回目 テーブル <span class="table-badge">${escapeHTML(entry.table1)}</span></h3>
            <ul class="member-list">
              ${members1.map(m => `<li class="${m.name === entry.name ? 'is-me' : ''}"><a href="${escapeHTML(m.url)}" target="_blank" rel="noopener">${escapeHTML(m.name)}</a></li>`).join('')}
            </ul>
          </div>

          <div class="round-section">
            <h3>2回目 テーブル <span class="table-badge">${escapeHTML(entry.table2)}</span></h3>
            <ul class="member-list">
              ${members2.map(m => `<li class="${m.name === entry.name ? 'is-me' : ''}"><a href="${escapeHTML(m.url)}" target="_blank" rel="noopener">${escapeHTML(m.name)}</a></li>`).join('')}
            </ul>
          </div>
        </div>
      `;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    let debounceTimer;
    const nameInput = document.getElementById('searchName');
    const urlInput = document.getElementById('searchUrl');

    nameInput.addEventListener('input', () => {
      urlInput.value = '';
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(doSearch, 300);
    });

    urlInput.addEventListener('input', () => {
      nameInput.value = '';
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(doSearch, 300);
    });

    loadData();
  </script>
</body>
</html>
