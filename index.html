<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座席検索 | リベシティイベント</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .search-container {
      max-width: 600px;
      margin: -1.5rem auto 2rem;
      padding: 0 1rem;
    }
    .search-box {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      padding: 1.5rem;
    }
    .search-box label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .search-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    .search-box input:focus {
      border-color: #667eea;
    }
    .search-box .hint {
      font-size: 0.8rem;
      color: #718096;
      margin-top: 0.5rem;
    }
    .result-container {
      max-width: 700px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
    }
    .no-result, .loading, .error {
      text-align: center;
      padding: 2rem;
      color: #718096;
      font-size: 0.95rem;
    }
    .error { color: #e53e3e; }
    .profile-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .profile-card h2 {
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
      word-break: break-all;
    }
    .profile-card .profile-url {
      font-size: 0.8rem;
      color: #667eea;
      word-break: break-all;
      display: block;
      margin-bottom: 1rem;
      text-decoration: none;
    }
    .profile-card .profile-url:hover { text-decoration: underline; }
    .round-section {
      background: #f7fafc;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .round-section:last-child { margin-bottom: 0; }
    .round-section h3 {
      font-size: 1rem;
      color: #4a5568;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .round-section h3 .table-badge {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .member-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .member-list li {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .member-list li.is-me {
      background: #667eea;
      color: white;
      border-color: #667eea;
      font-weight: 600;
    }
    .member-list li a {
      color: inherit;
      text-decoration: none;
    }
    .member-list li:not(.is-me) a:hover {
      text-decoration: underline;
    }
    .footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #a0aec0;
    }
    @media (max-width: 480px) {
      .header h1 { font-size: 1.2rem; }
      .search-box { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>リベシティイベント 座席検索</h1>
    <p>リベシティ名またはプロフィールURLで検索できます</p>
  </div>

  <div class="search-container">
    <div class="search-box">
      <label for="searchInput">検索</label>
      <input type="text" id="searchInput" placeholder="リベシティ名 または プロフィールURLを入力...">
      <p class="hint">例：「Bora太郎」「libecity.com/user_profile/xxx」</p>
    </div>
  </div>

  <div class="result-container" id="results">
    <p class="no-result" id="initialMessage">リベシティ名またはプロフィールURLを入力して検索してください</p>
  </div>

  <div class="footer">
    データはGoogleスプレッドシートから取得しています
  </div>

  <script>
    const SPREADSHEET_ID = '1KiYzG4fGmfUKQzs3HRnqZspSx2UMJ33_QCcMdAXuzsQ';
    const GID = '1790222964';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GID}`;

    let allData = [];
    let table1Groups = {};  // テーブル名 → メンバー配列
    let table2Groups = {};

    // CSV読み込み
    async function loadData() {
      const results = document.getElementById('results');
      results.innerHTML = '<p class="loading">データを読み込み中...</p>';

      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error('データの取得に失敗しました');
        const text = await res.text();
        parseCSV(text);
        results.innerHTML = '<p class="no-result" id="initialMessage">リベシティ名またはプロフィールURLを入力して検索してください</p>';
      } catch (e) {
        results.innerHTML = `<p class="error">データの読み込みに失敗しました。<br>ページを再読み込みしてください。</p>`;
        console.error(e);
      }
    }

    function parseCSV(text) {
      const lines = text.split('\n');
      let dataStarted = false;

      for (const line of lines) {
        const cols = parseCSVLine(line);

        // ヘッダー行を検出
        if (!dataStarted) {
          if (cols[0] && cols[0].includes('リベシティ名')) {
            dataStarted = true;
          }
          continue;
        }

        // データ行
        const name = (cols[0] || '').trim();
        const url = (cols[1] || '').trim();
        const table1 = (cols[2] || '').trim();
        const serial1 = (cols[3] || '').trim();
        const table2 = (cols[4] || '').trim();
        const serial2 = (cols[5] || '').trim();

        if (!name && !url) continue;

        const entry = { name, url, table1, serial1, table2, serial2 };
        allData.push(entry);

        // グループ分け
        if (table1) {
          if (!table1Groups[table1]) table1Groups[table1] = [];
          table1Groups[table1].push(entry);
        }
        if (table2) {
          if (!table2Groups[table2]) table2Groups[table2] = [];
          table2Groups[table2].push(entry);
        }
      }
    }

    // CSV行パーサー（ダブルクォート対応）
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"') {
            if (i + 1 < line.length && line[i + 1] === '"') {
              current += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            current += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            result.push(current);
            current = '';
          } else {
            current += ch;
          }
        }
      }
      result.push(current);
      return result;
    }

    function search(query) {
      const results = document.getElementById('results');
      if (!query.trim()) {
        results.innerHTML = '<p class="no-result">リベシティ名またはプロフィールURLを入力して検索してください</p>';
        return;
      }

      const q = query.trim().toLowerCase();
      const matches = allData.filter(d =>
        d.name.toLowerCase().includes(q) || d.url.toLowerCase().includes(q)
      );

      if (matches.length === 0) {
        results.innerHTML = '<p class="no-result">該当するデータが見つかりませんでした</p>';
        return;
      }

      // 多すぎる場合は上位10件に制限
      const shown = matches.slice(0, 10);
      results.innerHTML = shown.map(m => renderResult(m)).join('');

      if (matches.length > 10) {
        results.innerHTML += `<p class="no-result">他 ${matches.length - 10} 件が該当しています。検索条件を絞り込んでください。</p>`;
      }
    }

    function renderResult(entry) {
      const members1 = table1Groups[entry.table1] || [];
      const members2 = table2Groups[entry.table2] || [];

      return `
        <div class="profile-card">
          <h2>${escapeHTML(entry.name)}</h2>
          <a class="profile-url" href="${escapeHTML(entry.url)}" target="_blank" rel="noopener">${escapeHTML(entry.url)}</a>

          <div class="round-section">
            <h3>1回目（9:30〜11:30） テーブル <span class="table-badge">${escapeHTML(entry.table1)}</span></h3>
            <ul class="member-list">
              ${members1.map(m => `<li class="${m.name === entry.name ? 'is-me' : ''}"><a href="${escapeHTML(m.url)}" target="_blank" rel="noopener">${escapeHTML(m.name)}</a></li>`).join('')}
            </ul>
          </div>

          <div class="round-section">
            <h3>2回目 テーブル <span class="table-badge">${escapeHTML(entry.table2)}</span></h3>
            <ul class="member-list">
              ${members2.map(m => `<li class="${m.name === entry.name ? 'is-me' : ''}"><a href="${escapeHTML(m.url)}" target="_blank" rel="noopener">${escapeHTML(m.name)}</a></li>`).join('')}
            </ul>
          </div>
        </div>
      `;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // 入力イベント（デバウンス付き）
    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => search(e.target.value), 300);
    });

    // 初期読み込み
    loadData();
  </script>
</body>
</html>
